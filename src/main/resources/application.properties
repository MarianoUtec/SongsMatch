# Server
server.port=8081

# Database - PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/musicmatch
spring.datasource.username=${DB_USERNAME:musicmatch}
spring.datasource.password=${DB_PASSWORD:musicmatch}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# JWT
jwt.secret=${JWT_SECRET:musicmatch-super-secret-key-that-is-long-enough-for-hs256-algorithm}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# Mail (Resend / SMTP)
spring.mail.host=${MAIL_HOST:smtp.resend.com}
spring.mail.port=${MAIL_PORT:465}
spring.mail.username=${MAIL_USERNAME:resend}
spring.mail.password=${MAIL_PASSWORD:your-resend-api-key}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
mail.from=${MAIL_FROM:noreply@musicmatch.com}

# Spotify API
spotify.client-id=${SPOTIFY_CLIENT_ID:your-client-id}
spotify.client-secret=${SPOTIFY_CLIENT_SECRET:your-client-secret}
spotify.token-url=https://accounts.spotify.com/api/token
spotify.api-url=https://api.spotify.com/v1

# Async
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=20
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=musicmatch-async-

# CORS
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}
